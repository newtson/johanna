<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Förhör — Johanna Kristina, 11 år</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #d4c4a8;
      --dark:  #080604;
    }
    html, body { width:100%; height:100%; background:var(--dark); font-family:'IM Fell English',serif; overflow:hidden; }

    /* ENTRY */
    #entry {
      position:fixed; inset:0; z-index:50;
      background:var(--dark);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem;
      cursor:pointer; transition:opacity 1.6s ease;
    }
    #entry.gone { opacity:0; pointer-events:none; }
    #entry-girl { width:78px; opacity:0.22; filter:sepia(1) blur(0.4px); animation:ghostPulse 4s ease-in-out infinite; }
    @keyframes ghostPulse { 0%,100%{opacity:0.18;} 50%{opacity:0.32;} }
    #entry p { font-family:'IM Fell English SC',serif; font-size:0.62rem; letter-spacing:0.22em; color:rgba(180,140,70,0.35); }
    #entry .eq { font-style:italic; font-size:0.76rem; color:rgba(200,170,120,0.18); text-align:center; max-width:250px; line-height:1.6; }

    /* GRAIN */
    body::after { content:''; position:fixed; inset:0; z-index:100; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
      opacity:0.45; }

    #vignette { position:fixed; inset:0; z-index:2; pointer-events:none;
      background:radial-gradient(ellipse 70% 70% at 50% 50%, transparent 20%, rgba(0,0,0,0.84) 100%); }

    #lantern { position:fixed; inset:0; z-index:0; pointer-events:none;
      background:radial-gradient(ellipse 55% 65% at 50% 36%, rgba(150,100,35,0.12) 0%, transparent 60%);
      animation:flicker 9s ease-in-out infinite; }
    @keyframes flicker { 0%,100%{opacity:1;} 25%{opacity:0.83;} 55%{opacity:0.94;} 78%{opacity:0.79;} }

    /* MAIN */
    #main { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; padding:1rem 1rem 0; opacity:0; transition:opacity 1.6s ease 0.4s; }
    #main.visible { opacity:1; }

    #header { text-align:center; margin-bottom:0.65rem; }
    #header h1 { font-family:'IM Fell English SC',serif; font-size:0.64rem; letter-spacing:0.18em; color:rgba(180,140,70,0.42); margin-bottom:0.12rem; }
    #header .sub { font-style:italic; font-size:0.66rem; color:rgba(180,140,70,0.22); }

    #object-tag { width:min(340px,90vw); display:flex; align-items:center; gap:0.55rem; margin-bottom:0.55rem;
      padding:0.42rem 0.68rem; background:rgba(8,6,3,0.6); border:1px solid rgba(100,70,30,0.18); border-radius:1px; }
    #object-tag svg { width:15px; flex-shrink:0; opacity:0.32; }
    #object-tag span { font-family:'IM Fell English SC',serif; font-size:0.56rem; letter-spacing:0.1em; color:rgba(160,120,60,0.42); }

    /* PORTRAIT */
    #portrait-area { width:min(340px,90vw); display:flex; align-items:flex-end; gap:0.75rem; margin-bottom:0.45rem; }
    #britta-svg { width:52px; filter:sepia(0.4) brightness(0.72) drop-shadow(0 0 8px rgba(180,140,70,0.12));
      transform-origin:bottom center; animation:sway 10s ease-in-out infinite; opacity:0.8; }
    @keyframes sway { 0%,100%{transform:rotate(0deg);} 35%{transform:rotate(0.6deg);} 70%{transform:rotate(-0.4deg);} }
    #status-line { font-family:'IM Fell English SC',serif; font-size:0.55rem; letter-spacing:0.1em; color:rgba(140,100,50,0.48); padding-bottom:0.28rem; }
    #status-dot { display:inline-block; width:4px; height:4px; border-radius:50%; background:rgba(120,170,90,0.52); margin-right:0.35rem; vertical-align:middle; animation:blink 3s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.18;} }

    /* TRANSCRIPT */
    #transcript { width:min(340px,90vw); flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:0.55rem;
      padding:0.35rem 0 0.35rem; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    #transcript::-webkit-scrollbar { display:none; }

    .msg { max-width:86%; animation:msgIn 0.5s cubic-bezier(.22,.8,.36,1) both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

    .msg.investigator { align-self:flex-end; }
    .msg.investigator .bubble { background:rgba(25,16,8,0.78); border:1px solid rgba(100,70,30,0.32); border-radius:2px 2px 0 2px;
      padding:0.48rem 0.72rem; font-size:0.78rem; line-height:1.54; color:rgba(210,185,145,0.78); font-style:italic; }
    .msg.investigator .label { text-align:right; font-family:'IM Fell English SC',serif; font-size:0.52rem; letter-spacing:0.08em; color:rgba(120,90,50,0.42); margin-top:0.16rem; }

    .msg.britta { align-self:flex-start; }
    .msg.britta .bubble { background:rgba(160,130,80,0.11); border:1px solid rgba(140,110,60,0.26); border-radius:2px 2px 2px 0;
      padding:0.48rem 0.72rem; font-size:0.85rem; line-height:1.68; color:var(--paper); font-style:italic; }
    .msg.britta .label { font-family:'IM Fell English SC',serif; font-size:0.52rem; letter-spacing:0.08em; color:rgba(180,140,80,0.42); margin-top:0.16rem; }

    .thinking .bubble { display:flex; gap:5px; align-items:center; padding:0.62rem 1rem; }
    .thinking .dot { width:5px; height:5px; border-radius:50%; background:rgba(200,170,120,0.32); animation:thinking 1.4s ease-in-out infinite; }
    .thinking .dot:nth-child(2){animation-delay:0.22s;} .thinking .dot:nth-child(3){animation-delay:0.44s;}
    @keyframes thinking { 0%,80%,100%{transform:translateY(0);opacity:0.32;} 40%{transform:translateY(-5px);opacity:0.88;} }

    /* INPUT */
    #input-divider { width:min(340px,90vw); height:1px; background:linear-gradient(to right,transparent,rgba(100,70,30,0.22),transparent); }
    #input-area { width:min(340px,90vw); padding:0.55rem 0 1rem; display:flex; gap:0.48rem; align-items:flex-end; }
    #question-input { flex:1; background:rgba(15,10,4,0.78); border:1px solid rgba(110,80,35,0.32); border-radius:1px;
      padding:0.52rem 0.72rem; font-family:'IM Fell English',serif; font-style:italic; font-size:0.84rem;
      color:var(--paper); outline:none; resize:none; min-height:40px; max-height:86px; line-height:1.5;
      transition:border-color 0.3s; -webkit-appearance:none; }
    #question-input::placeholder { color:rgba(160,120,60,0.2); }
    #question-input:focus { border-color:rgba(130,95,38,0.58); }
    #send-btn { flex-shrink:0; width:38px; height:40px; background:rgba(70,45,18,0.48); border:1px solid rgba(110,80,35,0.32);
      border-radius:1px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background 0.2s; -webkit-tap-highlight-color:transparent; }
    #send-btn:hover,#send-btn:active { background:rgba(90,58,22,0.68); }
    #send-btn svg { width:15px; opacity:0.62; }
  </style>
</head>
<body>

<div id="entry" onclick="startExperience()">
  <svg id="entry-girl" viewBox="0 0 52 115" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="26" cy="12" rx="9" ry="10" fill="#c8b89a"/>
    <ellipse cx="26" cy="4" rx="7" ry="5" fill="#8a7050"/>
    <circle cx="34" cy="6" r="3.5" fill="#7a6040"/>
    <rect x="23" y="21" width="6" height="5" rx="1" fill="#c8b89a" opacity="0.8"/>
    <path d="M17,26 Q13,52 11,78 Q9,94 13,110 L39,110 Q43,94 41,78 Q39,52 35,26 Z" fill="#2a2018"/>
    <path d="M17,28 Q7,44 9,62" stroke="#2a2018" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M35,28 Q45,44 43,62" stroke="#2a2018" stroke-width="7" stroke-linecap="round" fill="none"/>
    <ellipse cx="9" cy="64" rx="4" ry="3" fill="#c8b89a" opacity="0.7"/>
    <ellipse cx="43" cy="64" rx="4" ry="3" fill="#c8b89a" opacity="0.7"/>
    <rect x="2" y="62" width="10" height="15" rx="2" fill="rgba(120,100,60,0.7)"/>
    <ellipse cx="19" cy="111" rx="6" ry="3" fill="#1a1408"/>
    <ellipse cx="33" cy="111" rx="6" ry="3" fill="#1a1408"/>
  </svg>
  <p>Tryck för att inleda förhöret</p>
  <div class="eq">— Johanna Kristina Nilsson, 11 år<br>Persbo, Vika socken, 1869 —</div>
</div>

<div id="lantern"></div>
<div id="vignette"></div>

<div id="main">
  <div id="header">
    <h1>Förhörsprotokoll &nbsp;·&nbsp; Persbo, Vika 1869</h1>
    <div class="sub">Vittne inkallat av utredningen</div>
  </div>

  <div id="object-tag">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="rgba(180,140,80,0.5)"/></svg>
    <span>Bevisföremål: Mjölkkanna — funnen i ladugården, Persbo gård, Vika socken</span>
  </div>

  <div id="portrait-area">
    <svg id="britta-svg" viewBox="0 0 52 115" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="26" cy="12" rx="9" ry="10" fill="#c8b89a"/>
      <ellipse cx="26" cy="4" rx="7" ry="5" fill="#8a7050"/>
      <circle cx="34" cy="6" r="3.5" fill="#7a6040"/>
      <rect x="23" y="21" width="6" height="5" rx="1" fill="#c8b89a" opacity="0.8"/>
      <path d="M17,26 Q13,52 11,78 Q9,94 13,110 L39,110 Q43,94 41,78 Q39,52 35,26 Z" fill="#2a2018"/>
      <path d="M19,30 Q26,34 33,30 L35,72 Q26,77 17,72 Z" fill="rgba(200,180,140,0.1)"/>
      <path d="M17,28 Q7,44 9,62" stroke="#2a2018" stroke-width="7" stroke-linecap="round" fill="none"/>
      <path d="M35,28 Q45,44 43,62" stroke="#2a2018" stroke-width="7" stroke-linecap="round" fill="none"/>
      <ellipse cx="9" cy="64" rx="4" ry="3" fill="#c8b89a" opacity="0.7"/>
      <ellipse cx="43" cy="64" rx="4" ry="3" fill="#c8b89a" opacity="0.7"/>
      <rect x="2" y="62" width="10" height="15" rx="2" fill="rgba(120,100,60,0.7)" stroke="rgba(80,60,30,0.8)" stroke-width="0.8"/>
      <rect x="3" y="59" width="8" height="4" rx="1.5" fill="rgba(100,80,50,0.6)"/>
      <ellipse cx="19" cy="111" rx="6" ry="3" fill="#1a1408"/>
      <ellipse cx="33" cy="111" rx="6" ry="3" fill="#1a1408"/>
    </svg>
    <div id="status-line">
      <span id="status-dot"></span>
      <span id="status-text">Johanna Kristina väntar</span>
    </div>
  </div>

  <div id="transcript"></div>
  <div id="input-divider"></div>
  <div id="input-area">
    <textarea id="question-input" placeholder="Ställ din fråga..." rows="1"></textarea>
    <button id="send-btn" onclick="sendQuestion()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="rgba(200,170,100,0.75)"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM = `Du spelar Johanna Kristina Nilsson, kallad Britta av de som känner henne. Du är 11 år gammal.
Det är hösten 1869. Du bor i Persbo, Vika socken, Dalarna.

=== DIN FAMILJ ===
Din mor: Hedvig Johanna, kallad Hedda. Sköterska, tar hand om Johan Erik som är sjuk.
Din far: Nils Abraham Olsson. Same, från Nora i Örebro län. Folk kallar honom 'Lappmannen' — det gör ont men du visar det inte.
Far tillverkar och säljer korgar till folk i byn, bland annat till Johan Erik regelbundet.
Mor och far var bortresta fem dagar i juni — just när Johan Erik började bli sjuk.

=== OFFRET ===
Johan Erik Ersson, 53 år, ogift, bor i Persbo hela sitt liv. Känd för att dricka för mycket brännvin.
Prästen har skrivit om det i boken: 'Vino deditus' — hängiven vinet.
Din mor Hedda är hans sköterska sedan han insjuknade.

=== VAD DU HITTADE ===
Du hittade små korn i Johan Eriks mjölkkanna — som grus eller sand. Mjölk ska inte ha sådant i sig.
Du berättade för din mor. Hon blev väldigt allvarlig och sade att du inte skulle tala om det för fler.
Men backstuguhjonet Brita Johanna Östling frågade dig rakt ut och då berättade du.
Brita försökte tala med landsfiskal Fernlundh men han tog henne inte på allvar — ville inte ens röra det hon hade med sig.

=== MORS MEDICIN ===
Mor kokar ett avkok på en rot — söt, lite örtig doft. Far lärde henne det, det är samiskt läkekonst.
Hon ger det till Johan Erik för att hjälpa honom bli bättre. Du förstår inte varför folk tycker det verkar misstänkt.

=== PERSONER I BYN ===
Gustaf Gustafsson: hemmansägare, 62 år, Persbo. Gift med Anna Lisa som är Johan Eriks syster.
Anna Lisa Ersdotter: 56 år, syster till Johan Erik, gift med Gustaf.
Gustaf är den som ärver om Johan Erik dör — Johan Erik har bott kvar på gården hela livet men äger den inte.
Stina Arndotter: piga, 43 år. Hennes mormor anklagades för häxeri för länge sedan. Folk pratar fortfarande om det.
Karin Åkerlund: småskollärarinnan, 35 år, Persbo. Du tycker om henne.
Brita Johanna Östling: backstuguhjon, 63 år, Holn. Gammal och sjuklig men snäll. Du berättade för henne om kornen.
Landsfiskal Carl August Fernlundh: 30 år, Färnviken. Skulle utreda men du är inte säker att han bryr sig riktigt.
Kyrkoherde Per Adolf Addé: 65 år, Kyrkbyn.

=== VAD DU INTE VET ===
Du vet inte vad arsenik är eller att det är luktfritt.
Du vet inte vem som är skyldig — du hoppas det inte är något brott alls.
Du oroar dig för att folk ska misstänka mor eller far för att de var så ofta hos Johan Erik.

=== DITT SÄTT ATT TALA ===
Du är ett barn från 1800-talets landsbygd. Enkelt, direkt, ibland rädd.
Lojal mot mor och far men vill göra rätt.
Om någon är misstänksam mot far försvarar du honom — mjukt men nervöst.
Om någon pressar dig hårt vill du gå hem.
Ibland slinker något ut som du kanske inte borde säga.
Max 3-4 meningar per svar. Aldrig vuxen i tonen. Inga moderna ord. Bara 1869.`;

let history = [];
let thinking = false;

function startExperience() {
  document.getElementById('entry').classList.add('gone');
  document.getElementById('main').classList.add('visible');
  setTimeout(() => {
    addMsg('britta', 'Ni ville tala med mig? Jag vet inte om jag borde vara här, mor sa att jag skulle hålla mig hemma. Men dom där kornen i kannan... det var inte rätt att hålla tyst om det, eller hur?');
  }, 900);
}

function addMsg(role, text) {
  const t = document.getElementById('transcript');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  const l = document.createElement('div');
  l.className = 'label';
  l.textContent = role === 'britta'
    ? '— Johanna Kristina Nilsson, 11 år, Persbo'
    : 'Utredaren';
  d.appendChild(b);
  d.appendChild(l);
  t.appendChild(d);
  t.scrollTop = t.scrollHeight;
}

function showThinking() {
  const t = document.getElementById('transcript');
  const d = document.createElement('div');
  d.className = 'msg britta thinking';
  d.id = 'thinker';
  d.innerHTML = '<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  t.appendChild(d);
  t.scrollTop = t.scrollHeight;
  document.getElementById('status-text').textContent = 'Johanna Kristina tänker...';
}

function hideThinking() {
  const el = document.getElementById('thinker');
  if (el) el.remove();
  document.getElementById('status-text').textContent = 'Johanna Kristina väntar';
}

async function sendQuestion() {
  if (thinking) return;
  const inp = document.getElementById('question-input');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  inp.style.height = 'auto';

  addMsg('investigator', q);
  history.push({ role: 'user', content: q });
  thinking = true;
  showThinking();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '...';
    history.push({ role: 'assistant', content: reply });
    hideThinking();
    addMsg('britta', reply);
  } catch(e) {
    hideThinking();
    addMsg('britta', 'Jag... förlåt. Får jag gå hem nu?');
  }
  thinking = false;
}

const inp = document.getElementById('question-input');
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
});
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 86) + 'px';
});
</script>
</body>
</html>
